name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake
          pip3 install --upgrade buildozer cython
          
      - name: Accept Licenses and Build
        env:
          # هذا السطر يجبر buildozer على تخطي التراخيص بهذه الطريقة
          ANDROIDSDK: "/home/runner/.android"
        run: |
          # إنشاء مجلدات التراخيص يدوياً
          mkdir -p ~/.android
          echo '### License accepted by GitHub Actions' > ~/.android/repositories.cfg
          
          # تشغيل البناء مع توفير الموافقة لجميع التراخيص
          # نستخدم yes مع sdkmanager ليوافق على كل شيء
          (yes | sdkmanager --licenses) || true
          buildozer --verbose android debug
