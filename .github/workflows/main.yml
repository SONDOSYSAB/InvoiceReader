name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # استخدام حاوية جاهزة تحتوي على كل مكتبات Buildozer مسبقاً
    container:
      image: kivy/buildozer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          # هذه الحاوية تحتوي على كل شيء، فقط نحتاج لتشغيل البناء
          # نتأكد من تثبيت المتطلبات الأساسية
          pip install --upgrade buildozer cython
          buildozer android debug
